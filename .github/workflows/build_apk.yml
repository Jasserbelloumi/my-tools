name: Build Patched APK

on:
  push:
    branches:
      - master
    paths:
      - 'app/**'
      - '*.gradle'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew || true
          gradle assembleDebug --stacktrace
